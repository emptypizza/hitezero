[build]
  publish = "dist/godot-web/site_nothreads"
  command = "bash godot/tools/netlify_build.sh"

[[headers]]
  for = "/*.wasm"
  [headers.values]
    Content-Type = "application/wasm"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/godot.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/game.zip"
  [headers.values]
    Content-Type = "application/zip"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.worklet.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
