name: Android (AAB + APK)

# Builds a SIGNED Android App Bundle (.aab, for Google Play) and a signed
# .apk (for sideload testing) and uploads them as downloadable artifacts.
#
# HOW TO RUN
#   - Actions tab -> "Android (AAB + APK)" -> "Run workflow"   (manual), or
#   - push a tag like v1.0.0
# Then download from the run's "Artifacts" section.
#
# REQUIRED REPO SECRETS  (Settings -> Secrets and variables -> Actions)
#   ANDROID_KEYSTORE_BASE64    base64 of your upload keystore (.jks)
#                              make it:  base64 -w0 hitezero_upload.jks  > key.b64
#   ANDROID_KEY_ALIAS          the key alias (keytool -list -v -keystore *.jks)
#   ANDROID_KEYSTORE_PASSWORD  the keystore password (assumes key pw == store pw)
#
# IMPORTANT: GODOT_VERSION below MUST exactly match the editor version the
# project was made with (export templates are version-locked). Project reports
# "4.6" (config/features). If yours is 4.6.1 etc., change the tag accordingly.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  GODOT_VERSION: "4.6.2"        # <-- set to your EXACT Godot 4.6.x (local editor = 4.6.2)
  PROJECT_DIR: "godot"          # folder containing project.godot
  OUT_DIR: "build/android"

jobs:
  android:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.2   # batteries-included: Godot+templates+Android SDK+JDK
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make export templates visible to Godot
        run: |
          mkdir -p ~/.local/share/godot/export_templates
          cp -r /root/.local/share/godot/export_templates/* ~/.local/share/godot/export_templates/ 2>/dev/null || true
          ls -la ~/.local/share/godot/export_templates || true

      - name: Decode upload keystore from secret
        run: |
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is missing. Add it in Settings -> Secrets -> Actions."
            exit 1
          fi
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > /tmp/upload.keystore
          echo "keystore bytes: $(wc -c < /tmp/upload.keystore)"

      - name: Import project (generates .godot)
        working-directory: ${{ env.PROJECT_DIR }}
        run: godot --headless --import || true

      - name: Install Android build template (manual extract)
        # `godot --install-android-build-template` hangs indefinitely in this
        # container, so extract android_source.zip directly — the exact same
        # files the command would install — plus the .gdignore that stops Godot
        # recursively packing android/build/ into the export.
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -e
          SRC="$(find ~/.local/share/godot/export_templates -name android_source.zip | head -1)"
          echo "android_source.zip: $SRC"
          test -n "$SRC"
          VER="$(basename "$(dirname "$SRC")")"
          mkdir -p android/build
          unzip -q -o "$SRC" -d android/build/
          printf '%s' "$VER" > android/.build_version
          : > android/.gdignore
          test -f android/build/build.gradle && echo "build template installed ($VER)"

      - name: Configure Android SDK / Java paths for headless export
        # Godot reads the SDK + JDK paths only from editor settings (not env),
        # and the container ships none — so a headless export aborts with
        # "A valid Java SDK path is required". Write a minimal editor settings
        # file pointing at the container's SDK/JDK before exporting.
        run: |
          set -e
          ANDROID_SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          if [ -z "$ANDROID_SDK" ] && command -v sdkmanager >/dev/null; then ANDROID_SDK="$(cd "$(dirname "$(command -v sdkmanager)")/../.." && pwd)"; fi
          JAVA_SDK="${JAVA_HOME:-}"
          if [ -z "$JAVA_SDK" ]; then J="$(command -v javac || command -v java)"; JAVA_SDK="$(cd "$(dirname "$(readlink -f "$J")")/.." && pwd)"; fi
          echo "ANDROID_SDK=$ANDROID_SDK"; echo "JAVA_SDK=$JAVA_SDK"
          mkdir -p ~/.config/godot
          { echo '[gd_resource type="EditorSettings" format=3]'; echo '[resource]'; echo "export/android/android_sdk_path = \"$ANDROID_SDK\""; echo "export/android/java_sdk_path = \"$JAVA_SDK\""; } > ~/.config/godot/editor_settings-4.tres
          cp ~/.config/godot/editor_settings-4.tres ~/.config/godot/editor_settings-4.6.tres
          cat ~/.config/godot/editor_settings-4.tres

      - name: Export AAB + APK (signed release)
        working-directory: ${{ env.PROJECT_DIR }}
        env:
          GODOT_ANDROID_KEYSTORE_RELEASE_PATH: /tmp/upload.keystore
          GODOT_ANDROID_KEYSTORE_RELEASE_USER: ${{ secrets.ANDROID_KEY_ALIAS }}
          GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          set -e
          mkdir -p "../${{ env.OUT_DIR }}"
          # --- AAB (preset 'Android' is export_format=1) ---
          godot --headless --verbose --export-release "Android" "../${{ env.OUT_DIR }}/hitezero.aab"
          # --- APK (temporarily flip the preset to export_format=0) ---
          sed -i 's#gradle_build/export_format=1#gradle_build/export_format=0#' export_presets.cfg
          godot --headless --verbose --export-release "Android" "../${{ env.OUT_DIR }}/hitezero.apk"
          sed -i 's#gradle_build/export_format=0#gradle_build/export_format=1#' export_presets.cfg
          echo "--- outputs ---"; ls -la "../${{ env.OUT_DIR }}"

      - name: Verify release signatures
        # Guards against the silent-failure mode where a missing/typo'd keystore
        # secret makes Godot fall back to an unsigned or debug-signed artifact
        # that still "builds" green and becomes a Play upload candidate.
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -e
          APK="../${{ env.OUT_DIR }}/hitezero.apk"
          AAB="../${{ env.OUT_DIR }}/hitezero.aab"
          SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          APKSIGNER="$(find "$SDK" -name apksigner -type f 2>/dev/null | sort | tail -1)"
          echo "apksigner: $APKSIGNER"
          test -n "$APKSIGNER"
          echo "=== APK signature ==="
          "$APKSIGNER" verify --print-certs "$APK" | tee /tmp/apk_certs.txt
          if grep -qi "CN=Android Debug" /tmp/apk_certs.txt; then
            echo "::error::APK is signed with the Android DEBUG certificate, not the upload key."
            exit 1
          fi
          echo "=== AAB signature ==="
          jarsigner -verify "$AAB" | tee /tmp/aab_verify.txt
          if ! grep -qi "jar verified" /tmp/aab_verify.txt; then
            echo "::error::AAB failed signature verification (not signed by the upload key)."
            exit 1
          fi
          echo "✅ Release signatures verified."

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hitezero-android
          path: |
            ${{ env.OUT_DIR }}/hitezero.aab
            ${{ env.OUT_DIR }}/hitezero.apk
          if-no-files-found: error
